name: PetBnB
options:
  bundleIdPrefix: my.fabian.petbnb
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.24.0

targets:
  PetBnB:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Sources/Assets.xcassets
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PetBnB
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "Upload photos of your pet and their vaccination certificates."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_NAME: PetBnB
        PRODUCT_BUNDLE_IDENTIFIER: my.fabian.petbnb.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO   # simulator-only dev; flip for device/store
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    dependencies:
      - package: Supabase
        product: Supabase

  PetBnBTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PetBnB
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PetBnB.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PetBnB"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PetBnB:
    build:
      targets:
        PetBnB: all
        PetBnBTests: test
    test:
      targets:
        - PetBnBTests
    run:
      config: Debug
    archive:
      config: Release
